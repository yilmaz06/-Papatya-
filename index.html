<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐇 Sürpriz!</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a1a;
      min-height: 100vh;
      font-family: 'Nunito', cursive, sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.2; }
      to   { opacity: 1;   }
    }

    .screen {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 24px;
      text-align: center;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }
    .screen.active { display: flex; }

    /* ── BAŞLANGIÇ ── */
    .start-emoji  { font-size: 5em; }
    .start-title  {
      color: #FFD700;
      font-size: 2.2em;
      font-weight: 900;
      text-shadow: 0 0 18px #FFD700;
    }
    .start-sub {
      color: #FFB6C1;
      font-size: 1.3em;
      font-weight: 700;
    }
    .btn-start {
      background: linear-gradient(135deg, #FF69B4, #ff3d9a);
      color: white;
      border: none;
      padding: 18px 50px;
      border-radius: 32px;
      font-size: 1.6em;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 6px 22px rgba(255,105,180,0.55);
      animation: btn-pulse 1.6s infinite ease-in-out;
    }
    @keyframes btn-pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.07); }
    }

    /* ── YARIŞ ── */
    .race-title {
      color: #FFD700;
      font-size: 1.8em;
      font-weight: 900;
      text-shadow: 0 0 14px #FFD700;
    }
    .race-track {
      width: 100%;
      background: #1a1a3e;
      border-radius: 18px;
      padding: 16px 12px;
    }
    .lane {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
    }
    .lane:last-child { margin-bottom: 0; }
    .lane-label {
      color: #aaa;
      font-size: 1em;
      font-weight: 700;
      width: 24px;
      flex-shrink: 0;
    }
    .lane-track {
      flex: 1;
      height: 46px;
      background: #2a2a5e;
      border-radius: 23px;
      position: relative;
      overflow: hidden;
    }
    .finish-line {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 5px;
      background: repeating-linear-gradient(
        to bottom,
        white 0px, white 5px,
        #0a0a1a 5px, #0a0a1a 10px
      );
    }
    .rabbit {
      position: absolute;
      font-size: 1.9em;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
    }

    @keyframes hop {
      0%, 100% { transform: translateY(-50%); }
      50%       { transform: translateY(-78%); }
    }
    @keyframes fast-shake {
      0%, 100% { transform: translateY(-50%) translateX(0); }
      33%       { transform: translateY(-60%) translateX(-1px); }
      66%       { transform: translateY(-42%) translateX(1px); }
    }
    @keyframes tired-sway {
      0%, 100% { transform: translateY(-50%) rotate(-7deg); }
      50%       { transform: translateY(-43%) rotate(7deg); }
    }

    .hop       { animation: hop        0.35s infinite ease-in-out; }
    .fast-run  { animation: fast-shake 0.13s infinite; }
    .tired     { animation: tired-sway 0.6s  infinite ease-in-out; }

    .race-msg {
      color: #FFB6C1;
      font-size: 1.2em;
      font-weight: 700;
      min-height: 30px;
    }

    /* ── QUIZ ── */
    .quiz-q {
      color: #FFD700;
      font-size: 1.7em;
      font-weight: 900;
      text-shadow: 0 0 14px #FFD700;
      line-height: 1.45;
    }
    .quiz-btns {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      min-height: 70px;
    }

    .btn-yes {
      background: linear-gradient(135deg, #FF69B4, #ff3d9a);
      color: white;
      border: none;
      padding: 15px 34px;
      border-radius: 28px;
      font-size: 1.3em;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,105,180,0.45);
      transition: transform 0.15s;
    }
    .btn-yes:active { transform: scale(0.94); }

    /* Q1 Hayır — başta normal akışta */
    .btn-no-inline {
      background: #555;
      color: white;
      border: none;
      padding: 15px 34px;
      border-radius: 28px;
      font-size: 1.3em;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s;
    }

    /* Q1 Hayır — kaçan (fixed) */
    .btn-no-fixed {
      background: #555;
      color: white;
      border: none;
      padding: 15px 34px;
      border-radius: 28px;
      font-size: 1.3em;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      position: fixed;
      z-index: 50;
      transition: left 0.15s, top 0.15s;
    }

    /* Q2 Hayır — büyüyen ama yerinde */
    .btn-no-grow {
      background: #555;
      color: white;
      border: none;
      padding: 15px 34px;
      border-radius: 28px;
      font-size: 1.3em;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      transition: font-size 0.3s;
    }

    /* Zorla EVET overlay */
    .forced-yes {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #FF69B4, #ff3d9a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5.5em;
      font-weight: 900;
      color: white;
      z-index: 200;
      cursor: pointer;
      text-shadow: 0 0 30px rgba(255,255,255,0.6);
      animation: forced-pulse 0.9s infinite alternate;
    }
    @keyframes forced-pulse {
      from { filter: brightness(1); }
      to   { filter: brightness(1.25); }
    }

    /* Büyük emoji buton */
    .btn-emoji {
      background: none;
      border: none;
      font-size: 4.5em;
      cursor: pointer;
      animation: emoji-pulse 1.4s infinite ease-in-out;
    }
    @keyframes emoji-pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.2); }
    }

    /* Uçan 🥺 emojileri */
    .floating-emoji {
      position: fixed;
      font-size: 1.8em;
      pointer-events: none;
      z-index: 100;
      animation: float-up 1.4s ease-out forwards;
    }
    @keyframes float-up {
      0%   { transform: translateY(0) scale(1);   opacity: 1; }
      100% { transform: translateY(-120px) scale(1.4); opacity: 0; }
    }

    /* ── PASTA ── */
    .cake-emoji {
      font-size: 5.5em;
      animation: cake-bounce 0.8s infinite alternate ease-in-out;
    }
    @keyframes cake-bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-18px); }
    }
    .cake-msg {
      color: #FFD700;
      font-size: 1.4em;
      font-weight: 700;
      text-shadow: 0 0 14px #FFD700;
      line-height: 1.7;
    }

    /* ── KONFETİ ── */
    .confetti {
      position: fixed;
      pointer-events: none;
      border-radius: 2px;
      animation: fall linear forwards;
      z-index: 999;
    }
    @keyframes fall {
      0%   { transform: translateY(-40px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh)  rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- BAŞLANGIÇ -->
<div class="screen active" id="start-screen">
  <div class="start-emoji">🐇🐰</div>
  <div class="start-title">Bir Sürprizin Var!</div>
  <div class="start-sub">Hazır mısın? 🌸</div>
  <button class="btn-start" onclick="startRace()">Yarışı Başlat 🏁</button>
</div>

<!-- YARIŞ -->
<div class="screen" id="race-screen">
  <div class="race-title">🏁 Yarış Başladı! 🏁</div>
  <div class="race-track">
    <div class="lane">
      <div class="lane-label">1</div>
      <div class="lane-track">
        <div class="finish-line"></div>
        <div class="rabbit" id="r1">🐰</div>
      </div>
    </div>
    <div class="lane">
      <div class="lane-label">2</div>
      <div class="lane-track">
        <div class="finish-line"></div>
        <div class="rabbit" id="r2">🐇</div>
      </div>
    </div>
  </div>
  <div class="race-msg" id="race-msg"></div>
</div>

<!-- QUIZ -->
<div class="screen" id="quiz-screen">
  <div class="quiz-q" id="quiz-q"></div>
  <div class="quiz-btns" id="quiz-btns"></div>
</div>

<!-- PASTA -->
<div class="screen" id="cake-screen">
  <div class="cake-emoji">🎂</div>
  <div class="cake-msg">
    🎉 İyiki doğdun prenses! 🎉<br><br>
    Sen olmasan eksik olurdu...<br>
    Her şey senin için 💛
  </div>
</div>

<script>
// ── YILDIZLAR ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 3 + 1;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    animation-delay:${Math.random()*3}s;
    animation-duration:${1.5+Math.random()*2}s;
  `;
  starsEl.appendChild(s);
}

// ── EKRAN ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── YARIŞ ──
const raceMessages = [
  { t: 0,    text: '🏁 Yarış başladı!' },
  { t: 1800, text: '🐰 Tavşan 1 önde gidiyor!' },
  { t: 4000, text: '😤 Tavşan 2 yaklaşıyor...' },
  { t: 6200, text: '😱 Tavşan 2 geçiyor!!!' },
  { t: 8000, text: '🎉 Tavşan 2 kazandı!!!' },
];

let msgIdx = 0;
let raceStart = null;
const RACE_MS = 10000;

function setPos(rabbit, pct) {
  const track = rabbit.parentElement;
  const max = track.offsetWidth - rabbit.offsetWidth - 6;
  rabbit.style.left = Math.max(0, Math.min((pct / 100) * max, max)) + 'px';
}

function clearAnim(el) {
  el.classList.remove('hop', 'fast-run', 'tired');
}

function raceLoop(ts) {
  if (!raceStart) raceStart = ts;
  const elapsed = ts - raceStart;
  const t = Math.min(elapsed / RACE_MS, 1);
  const r1 = document.getElementById('r1');
  const r2 = document.getElementById('r2');
  const msgEl = document.getElementById('race-msg');

  while (msgIdx < raceMessages.length && elapsed >= raceMessages[msgIdx].t) {
    msgEl.textContent = raceMessages[msgIdx].text;
    msgIdx++;
  }

  // Tavşan 1: önde, sonra yorulur
  let p1 = t < 0.6
    ? t * 1.4 * 100
    : 84 + (t - 0.6) * 0.4 * 100;
  p1 = Math.min(p1, 100);

  // Tavşan 2: geride, hamle yapar, t=0.8'de kazanır
  let p2;
  if      (t < 0.5) p2 = t * 1.1 * 100;
  else if (t < 0.8) p2 = 55 + (t - 0.5) * 1.5 * 100;
  else               p2 = 100;

  setPos(r1, p1);
  setPos(r2, p2);

  clearAnim(r1);
  if      (t < 0.3) r1.classList.add('fast-run');
  else if (t < 0.6) r1.classList.add('hop');
  else               r1.classList.add('tired');

  clearAnim(r2);
  if      (t < 0.5) r2.classList.add('hop');
  else if (t < 0.8) r2.classList.add('fast-run');

  if (t < 1) {
    requestAnimationFrame(raceLoop);
  } else {
    setTimeout(() => { showScreen('quiz-screen'); startQuiz(); }, 2500);
  }
}

function startRace() {
  showScreen('race-screen');
  msgIdx = 0;
  raceStart = null;
  requestAnimationFrame(raceLoop);
}

// ── QUIZ ──
let phase = 1;
let hayirCount = 0;
let evetCount  = 0;
let hayirIsFixed = false;

function startQuiz() {
  phase = 1;
  hayirCount = 0;
  evetCount  = 0;
  hayirIsFixed = false;
  renderQuiz();
}

function renderQuiz() {
  const qEl = document.getElementById('quiz-q');
  const bEl = document.getElementById('quiz-btns');

  // Sabit Hayır butonunu temizle
  const oldFixed = document.getElementById('hayir-fixed');
  if (oldFixed) oldFixed.remove();

  bEl.innerHTML = '';

  if (phase === 1) {
    // ── SORU 1 ──
    qEl.textContent = 'Beni seviyormusunnnnn 💛';

    const evet = document.createElement('button');
    evet.className = 'btn-yes';
    evet.textContent = 'Evet';
    evet.style.fontSize = (1.3 + hayirCount * 0.3) + 'em';
    evet.onclick = () => { phase = 2; evetCount = 0; renderQuiz(); };

    const hayir = document.createElement('button');
    hayir.textContent = 'Hayır';

    if (!hayirIsFixed) {
      // Başta normal akışta
      hayir.className = 'btn-no-inline';
      hayir.onclick = () => {
        hayirCount++;
        evet.style.fontSize = (1.3 + hayirCount * 0.3) + 'em';

        if (hayirCount >= 5) {
          hayir.remove();
          forcedYes();
          return;
        }

        // İlk tıklamada sabit konuma al
        hayirIsFixed = true;
        hayir.remove();

        const fixed = document.createElement('button');
        fixed.id = 'hayir-fixed';
        fixed.className = 'btn-no-fixed';
        fixed.textContent = 'Hayır';
        randomPos(fixed);
        document.body.appendChild(fixed);

        fixed.onclick = () => {
          hayirCount++;
          evet.style.fontSize = (1.3 + hayirCount * 0.3) + 'em';
          if (hayirCount >= 5) {
            fixed.remove();
            forcedYes();
          } else {
            randomPos(fixed);
          }
        };
      };
    }

    bEl.appendChild(evet);
    bEl.appendChild(hayir);

  } else if (phase === 2) {
    // ── SORU 2 ──
    qEl.textContent = 'Beni özlüyor musun? 🥺';

    const hayir = document.createElement('button');
    hayir.className = 'btn-no-grow';
    hayir.textContent = 'Hayır';
    hayir.style.fontSize = '1.3em';
    hayir.onclick = () => spawnEmojis(hayir, '🥺', 5);

    const evet = document.createElement('button');
    evet.className = 'btn-yes';
    evet.textContent = 'Evet';
    evet.onclick = () => {
      evetCount++;
      hayir.style.fontSize = (1.3 + evetCount * 0.45) + 'em';
      if (evetCount >= 5) { phase = 3; renderQuiz(); }
    };

    bEl.appendChild(evet);
    bEl.appendChild(hayir);

  } else if (phase === 3) {
    // ── SORU 3 ──
    qEl.textContent = 'Ben herzaman yanındayım, sen de aklımdasın hıh 🌸';

    const heart = document.createElement('button');
    heart.className = 'btn-emoji';
    heart.textContent = '❤️';
    heart.onclick = () => { phase = 4; renderQuiz(); };

    bEl.appendChild(heart);

  } else if (phase === 4) {
    // ── SORU 4 ──
    qEl.textContent = 'Seni çok seviyorum, bunu biliyorsun değil mi? 💛';

    const smile = document.createElement('button');
    smile.className = 'btn-emoji';
    smile.textContent = '🙃';
    smile.onclick = () => { showScreen('cake-screen'); confetti(); };

    bEl.appendChild(smile);
  }
}

function randomPos(btn) {
  btn.style.left = (8  + Math.random() * 62) + 'vw';
  btn.style.top  = (12 + Math.random() * 62) + 'vh';
}

function forcedYes() {
  const ov = document.createElement('div');
  ov.className = 'forced-yes';
  ov.textContent = 'EVET 💛';
  ov.onclick = () => {
    ov.remove();
    phase = 2;
    evetCount = 0;
    renderQuiz();
  };
  document.body.appendChild(ov);
}

function spawnEmojis(btn, emoji, count) {
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top;

  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'floating-emoji';
      el.textContent = emoji;
      el.style.left = (cx - 14 + (Math.random() - 0.5) * 50) + 'px';
      el.style.top  = cy + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1500);
    }, i * 120);
  }
}

// ── KONFETİ ──
function confetti() {
  const renkler = ['#FF69B4','#FFD700','#FF6347','#98FB98','#87CEEB','#DDA0DD','#FFA500'];
  for (let i = 0; i < 120; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      const size = 6 + Math.random() * 10;
      c.style.cssText = `
        left:${Math.random()*100}vw; top:-20px;
        width:${size}px; height:${size}px;
        background:${renkler[Math.floor(Math.random()*renkler.length)]};
        border-radius:${Math.random()>.5?'50%':'3px'};
        animation-duration:${2.5+Math.random()*3}s;
        animation-delay:${Math.random()*1.5}s;
      `;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 6000);
    }, i * 25);
  }
}
</script>
</body>
</html>
