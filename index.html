<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papatya 🌼</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg, #1a0a2e, #16213e, #0f3460);
  min-height: 100vh;
  font-family: Arial, sans-serif;
  overflow: hidden;
  color: white;
}
.screen {
  position: fixed; inset: 0;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px; text-align: center;
}
.screen.active { display: flex; }
.star {
  position: fixed; background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite alternate;
  pointer-events: none;
}
@keyframes twinkle {
  from { opacity: 0.2; } to { opacity: 1; }
}

/* BAŞLANGIÇ */
#s1 h1 {
  font-size: 36px; color: #ffd700;
  text-shadow: 0 0 20px #ffd700;
  margin-bottom: 15px;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}
#s1 p { font-size: 16px; color: #ccc; margin-bottom: 40px; }
#startBtn {
  padding: 15px 50px; font-size: 20px;
  background: #ffd700; color: #1a0a2e;
  border: none; border-radius: 50px;
  cursor: pointer; font-weight: bold;
  animation: bounce 1s infinite;
}
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* YARIŞ */
#raceTitle {
  font-size: 22px; color: #ffd700;
  margin-bottom: 25px; min-height: 32px;
}
.track-wrap { width: 92vw; max-width: 580px; margin: 8px 0; }
.track-label { font-size: 13px; color: #aaa; margin-bottom: 5px; text-align: left; padding-left: 5px; }
.track {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px; padding: 10px 15px;
  position: relative; height: 65px;
  display: flex; align-items: center;
}
.flag { position: absolute; right: 12px; font-size: 22px; }
.rabbit { font-size: 34px; position: absolute; left: 10px; transition: left 0.05s linear; }

/* ANKET */
#questionText {
  font-size: 22px; color: #ffd700;
  line-height: 1.6; margin-bottom: 45px;
  max-width: 340px;
}
#yesBtn {
  padding: 14px 32px; font-size: 18px;
  background: #27ae60; color: white;
  border: none; border-radius: 50px;
  cursor: pointer; font-weight: bold;
  position: fixed;
  transition: font-size 0.3s, padding 0.3s;
  z-index: 20;
}
#noBtn {
  padding: 14px 32px; font-size: 18px;
  background: #e74c3c; color: white;
  border: none; border-radius: 50px;
  cursor: pointer; font-weight: bold;
  position: fixed;
  transition: left 0.4s ease, top 0.4s ease;
  z-index: 20;
}

/* PASTA */
#s4 { gap: 15px; }
#s4 .cake {
  font-size: 100px;
  animation: cakeIn 1s ease-out;
}
@keyframes cakeIn {
  from { transform: scale(0) rotate(-20deg); opacity: 0; }
  to { transform: scale(1) rotate(0); opacity: 1; }
}
#s4 h1 {
  font-size: 28px; color: #ffd700;
  text-shadow: 0 0 20px #ffd700;
  animation: fadeUp 1s 0.5s both;
}
#s4 p {
  font-size: 16px; color: #ddd;
  line-height: 1.8; max-width: 320px;
  animation: fadeUp 1s 1s both;
}
.hearts { font-size: 34px; letter-spacing: 8px; animation: fadeUp 1s 1.5s both; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* KONFETİ */
.confetti {
  position: fixed; width: 10px; height: 10px;
  border-radius: 2px; pointer-events: none;
  animation: fall linear forwards; z-index: 999;
}
@keyframes fall {
  from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<!-- EKRAN 1: BAŞLANGIÇ -->
<div class="screen active" id="s1">
  <h1>🐇 Büyük Yarış 🐇</h1>
  <p>Hazır mısın? Sürpriz seni bekliyor!</p>
  <button id="startBtn" onclick="startRace()">Başlat! 🏁</button>
</div>

<!-- EKRAN 2: YARIŞ -->
<div class="screen" id="s2">
  <p id="raceTitle">Yarış başlıyor... 🏁</p>
  <div class="track-wrap">
    <div class="track-label">🐇 Tavşan 1</div>
    <div class="track" id="track1">
      <div class="rabbit" id="r1">🐇</div>
      <div class="flag">🏁</div>
    </div>
  </div>
  <div class="track-wrap">
    <div class="track-label">🐇 Tavşan 2</div>
    <div class="track" id="track2">
      <div class="rabbit" id="r2">🐇</div>
      <div class="flag">🏁</div>
    </div>
  </div>
</div>

<!-- EKRAN 3: ANKET -->
<div class="screen" id="s3">
  <p id="questionText">Peki... seni seven biri<br>olduğunu biliyor musun? 💛</p>
  <button id="yesBtn" onclick="handleYes()">Evet 💛</button>
  <button id="noBtn" onclick="handleNo()">Hayır</button>
</div>

<!-- EKRAN 4: PASTA -->
<div class="screen" id="s4">
  <div class="cake">🎂</div>
  <h1>İyi ki doğdun! 🎉</h1>
  <p>Sen olmasan eksik olurdu.<br>Bu gün, seninle daha güzel.<br>Çok şey söylemek isterdim ama<br>en güzeli şu: İyi ki varsın. 🤍</p>
  <div class="hearts">🤍🌼🤍</div>
</div>

<script>
// YILDIZLAR
for(let i = 0; i < 80; i++){
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `left:${Math.random()*100}vw;top:${Math.random()*100}vh;width:${Math.random()*3+1}px;height:${Math.random()*3+1}px;animation-delay:${Math.random()*2}s`;
  document.body.appendChild(s);
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── YARIŞ ───
function startRace(){
  showScreen('s2');
  const r1 = document.getElementById('r1');
  const r2 = document.getElementById('r2');
  const title = document.getElementById('raceTitle');
  const trackW = document.getElementById('track1').offsetWidth - 80;

  const msgs = [
    'Yarış başladı! 🏁',
    'Koşuyorlar! 💨',
    'Tavşan 1 önde! 😤',
    'Tavşan 2 geride kalıyor... 😮',
    'Dur bir dakika... Tavşan 2 hızlanıyor!! 😱',
    '🏆 İnanılmaz! Kazanan belli oldu!'
  ];
  let mi = 0;
  title.textContent = msgs[0];
  const mt = setInterval(()=>{ if(++mi < msgs.length-1) title.textContent = msgs[mi]; }, 1800);

  let elapsed = 0;
  const DURATION = 10000;

  const tick = setInterval(()=>{
    elapsed += 50;
    const t = elapsed / DURATION;

    // Tavşan 1: hızlı başlar, ortada önde, sonda yavaşlar
    let p1;
    if(t < 0.5)       p1 = t * 2.0 * 100;
    else if(t < 0.75) p1 = 100 + (t-0.5) * 0.9 * 100;
    else               p1 = 122.5 + (t-0.75) * 0.4 * 100;
    p1 = Math.min(p1, 100);

    // Tavşan 2: yavaş başlar, geride kalır, sonda hamle yapar ve kazanır
    let p2;
    if(t < 0.45)      p2 = t * 1.5 * 100;
    else if(t < 0.7)  p2 = 67.5 + (t-0.45) * 1.6 * 100;
    else               p2 = 107.5 + (t-0.7) * 3.2 * 100;
    p2 = Math.min(p2, 100);

    r1.style.left = (10 + (p1/100) * trackW) + 'px';
    r2.style.left = (10 + (p2/100) * trackW) + 'px';

    if(elapsed >= DURATION){
      clearInterval(tick);
      clearInterval(mt);
      title.textContent = '🏆 Kazanan belli oldu!';
      setTimeout(()=>{ showScreen('s3'); initButtons(); }, 2200);
    }
  }, 50);
}

// ─── ANKET ───
let noCount = 0;
let phase = 1;
let phaseYesCount = 0;

function initButtons(){
  const W = window.innerWidth;
  const H = window.innerHeight;
  const yesBtn = document.getElementById('yesBtn');
  const noBtn  = document.getElementById('noBtn');
  // Evet sola, Hayır sağa — ortada yan yana
  yesBtn.style.left  = (W/2 - 120) + 'px';
  yesBtn.style.top   = (H/2 + 40)  + 'px';
  noBtn.style.left   = (W/2 + 20)  + 'px';
  noBtn.style.top    = (H/2 + 40)  + 'px';
  noBtn.style.display = 'block';
}

function escapeNo(){
  const btn = document.getElementById('noBtn');
  const W = window.innerWidth - 120;
  const H = window.innerHeight - 80;
  // Tamamen rastgele bir yere kaç
  btn.style.left = (Math.random() * W) + 'px';
  btn.style.top  = (Math.random() * H * 0.7 + H * 0.05) + 'px';
}

function growYes(){
  const btn = document.getElementById('yesBtn');
  const cur = parseFloat(btn.style.fontSize) || 18;
  const nw  = Math.min(cur + 4, 42);
  btn.style.fontSize = nw + 'px';
  const p = 14 + (nw - 18) * 0.8;
  btn.style.padding  = p + 'px ' + (p*1.8) + 'px';
}

function handleNo(){
  if(phase === 1){
    noCount++;
    escapeNo();
    growYes();
    if(noCount >= 4){
      setTimeout(()=>{
        phase = 2;
        phaseYesCount = 0;
        document.getElementById('questionText').innerHTML = 'Eminmisinnnn...? 🤨';
      }, 500);
    }
  } else if(phase === 2){
    // Geri dön
    phase = 1;
    noCount = 3;
    document.getElementById('questionText').innerHTML = 'Peki... seni seven biri<br>olduğunu biliyor musun? 💛';
    initButtons();
  } else if(phase === 3){
    escapeNo();
    growYes();
  }
}

function handleYes(){
  if(phase === 1){
    showCake();
  } else if(phase === 2){
    // Hayır 3 kez kaçsın sonra phase 3
    let c = 0;
    const iv = setInterval(()=>{
      c++;
      escapeNo();
      growYes();
      if(c >= 3){
        clearInterval(iv);
        setTimeout(()=>{
          phase = 3;
          phaseYesCount = 0;
          document.getElementById('questionText').innerHTML = '"Kesin diyorsunnn yani..." 🤔';
        }, 800);
      }
    }, 600);
  } else if(phase === 3){
    phaseYesCount++;
    growYes();
    escapeNo();
    if(phaseYesCount >= 3){
      setTimeout(()=>{
        phase = 4;
        document.getElementById('questionText').innerHTML = 'Beni sevmeye mecbursun! 😤💛';
        const yes = document.getElementById('yesBtn');
        const W = window.innerWidth;
        const H = window.innerHeight;
        yes.style.fontSize = '32px';
        yes.style.padding  = '20px 60px';
        yes.style.left = (W/2 - 100) + 'px';
        yes.style.top  = (H/2 + 30) + 'px';
        document.getElementById('noBtn').style.display = 'none';
      }, 600);
    }
  } else if(phase === 4){
    showCake();
  }
}

function showCake(){
  confetti();
  showScreen('s4');
}

function confetti(){
  const colors = ['#ffd700','#ff6b6b','#4ecdc4','#a8e6cf','#ff8b94','#fff'];
  for(let i=0; i<100; i++){
    setTimeout(()=>{
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random()*100+'vw';
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      c.style.animationDuration = (Math.random()*2+2)+'s';
      document.body.appendChild(c);
      setTimeout(()=>c.remove(), 4000);
    }, i*30);
  }
}
</script>
</body>
</html>
