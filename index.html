<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sürpriz!</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      min-height: 100vh;
      font-family: 'Nunito', cursive, sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s infinite alternate; }
    @keyframes twinkle { from{opacity:0.15} to{opacity:1} }

    .screen {
      position: relative; z-index: 1;
      width: 100%; max-width: 480px;
      padding: 24px; text-align: center;
      display: none; flex-direction: column;
      align-items: center; gap: 22px;
    }
    .screen.active { display: flex; }

    /* BAŞLANGIÇ */
    .start-emoji { font-size: 5em; animation: float-ud 2s infinite ease-in-out alternate; }
    @keyframes float-ud { from{transform:translateY(0)} to{transform:translateY(-14px)} }
    .start-title { color:#FFD700; font-size:2.2em; font-weight:900; text-shadow:0 0 20px #FFD700; }
    .start-sub { color:#FFB6C1; font-size:1.3em; font-weight:700; }
    .btn-start {
      background: linear-gradient(135deg,#FF69B4,#ff3d9a);
      color: white; border: none;
      padding: 18px 50px; border-radius: 32px;
      font-size: 1.6em; font-weight: 900; font-family: inherit;
      cursor: pointer; box-shadow: 0 6px 22px rgba(255,105,180,0.55);
      -webkit-tap-highlight-color: transparent;
    }

    /* YARIŞ */
    .race-title { color:#FFD700; font-size:1.8em; font-weight:900; text-shadow:0 0 14px #FFD700; }
    .race-track { width:100%; background:#1a1a3e; border-radius:18px; padding:16px 12px; }
    .lane { display:flex; align-items:center; margin-bottom:14px; }
    .lane:last-child { margin-bottom:0; }
    .lane-label { color:#aaa; font-size:1em; font-weight:700; width:24px; flex-shrink:0; }
    .lane-track { flex:1; height:46px; background:#2a2a5e; border-radius:23px; position:relative; overflow:hidden; }
    .finish-line {
      position:absolute; right:0; top:0; bottom:0; width:5px;
      background:repeating-linear-gradient(to bottom,white 0,white 5px,#0a0a1a 5px,#0a0a1a 10px);
    }
    .rabbit { position:absolute; font-size:1.9em; top:50%; left:0; transform:translateY(-50%); }
    @keyframes hop { 0%,100%{transform:translateY(-50%)} 50%{transform:translateY(-78%)} }
    @keyframes fast-shake {
      0%,100%{transform:translateY(-50%) translateX(0)}
      33%{transform:translateY(-60%) translateX(-1px)}
      66%{transform:translateY(-42%) translateX(1px)}
    }
    @keyframes tired-sway {
      0%,100%{transform:translateY(-50%) rotate(-7deg)}
      50%{transform:translateY(-43%) rotate(7deg)}
    }
    .hop      { animation:hop        0.35s infinite ease-in-out; }
    .fast-run { animation:fast-shake 0.13s infinite; }
    .tired    { animation:tired-sway 0.6s  infinite ease-in-out; }
    .race-msg { color:#FFB6C1; font-size:1.2em; font-weight:700; min-height:30px; }

    /* QUIZ */
    .quiz-q { color:#FFD700; font-size:1.7em; font-weight:900; text-shadow:0 0 14px #FFD700; line-height:1.45; }
    .quiz-btns { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; align-items:center; min-height:70px; }
    .btn-yes {
      background:linear-gradient(135deg,#FF69B4,#ff3d9a);
      color:white; border:none; padding:15px 34px; border-radius:28px;
      font-size:1.3em; font-weight:900; font-family:inherit; cursor:pointer;
      box-shadow:0 4px 16px rgba(255,105,180,0.45);
      -webkit-tap-highlight-color:transparent;
    }
    .btn-no-inline {
      background:#555; color:white; border:none; padding:15px 34px;
      border-radius:28px; font-size:1.3em; font-weight:900;
      font-family:inherit; cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-no-fixed {
      background:#555; color:white; border:none; padding:15px 34px;
      border-radius:28px; font-size:1.3em; font-weight:900;
      font-family:inherit; cursor:pointer; position:fixed; z-index:50;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-no-grow {
      background:#555; color:white; border:none; padding:15px 34px;
      border-radius:28px; font-size:1.3em; font-weight:900;
      font-family:inherit; cursor:pointer; transition:font-size 0.3s;
      -webkit-tap-highlight-color:transparent;
    }
    .forced-yes {
      position:fixed; inset:0;
      background:linear-gradient(135deg,#FF69B4,#ff3d9a);
      display:flex; align-items:center; justify-content:center;
      font-size:5.5em; font-weight:900; color:white; z-index:200; cursor:pointer;
      text-shadow:0 0 30px rgba(255,255,255,0.6);
    }
    .btn-emoji {
      background:none; border:none; font-size:4.5em; cursor:pointer;
      display:inline-block; animation:emoji-pulse 1.4s infinite ease-in-out;
      -webkit-tap-highlight-color:transparent;
    }
    @keyframes emoji-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }

    /* PASTA */
    .cake-emoji {
      font-size:5.5em; cursor:pointer; display:inline-block;
      animation:cake-bounce 0.85s infinite alternate ease-in-out;
      -webkit-tap-highlight-color:transparent;
    }
    @keyframes cake-bounce { from{transform:translateY(0)} to{transform:translateY(-18px)} }
    @keyframes cake-shake {
      0%,100%{transform:rotate(-8deg) scale(0.95)}
      50%{transform:rotate(8deg) scale(0.9)}
    }
    .cake-msg { color:#FFD700; font-size:1.4em; font-weight:700; text-shadow:0 0 14px #FFD700; line-height:1.7; }
    .cake-hint { color:#FFB6C1; font-size:1em; font-weight:700; animation:blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .nom-text { color:#FF69B4; font-size:2em; font-weight:900; display:none; }

    /* ZARF */
    .envelope { width:240px; height:160px; position:relative; cursor:pointer; display:none; -webkit-tap-highlight-color:transparent; }
    .env-body {
      position:absolute; bottom:0; left:0; right:0; height:140px;
      background:#FFF0F5; border:2px solid #FFB6C1; border-radius:6px 6px 14px 14px;
    }
    .env-body::after {
      content:''; position:absolute; top:0; left:0; right:0; height:70px;
      background: linear-gradient(to bottom right,#FFD0E0 50%,transparent 50%),
                  linear-gradient(to bottom left,#FFD0E0 50%,transparent 50%);
      background-size:50% 100%; background-position:left top,right top; background-repeat:no-repeat;
    }
    .env-icon { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); font-size:2.2em; z-index:2; }
    .env-flap {
      position:absolute; top:-2px; left:-2px; right:-2px; z-index:4;
      height:80px; background:#FFB6C1;
      clip-path:polygon(0 0,100% 0,50% 100%);
      border-radius:6px 6px 0 0;
      transform-origin:top center; transition:transform 0.6s ease;
    }
    .envelope.open .env-flap { transform:rotateX(180deg); }
    .letter {
      display:none; background:white; border:1.5px solid #FFD0E0;
      border-radius:14px; padding:18px; text-align:center;
      animation:letter-in 0.6s ease-out;
    }
    @keyframes letter-in { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .letter-deco { font-size:1.4em; margin:6px 0; }
    .letter-text { color:#cc3366; font-size:1em; font-weight:700; line-height:1.8; margin:10px 0; }

    /* KONFETİ */
    .confetti { position:fixed; pointer-events:none; animation:fall linear forwards; z-index:999; }
    @keyframes fall {
      0%{transform:translateY(-40px) rotate(0deg);opacity:1}
      100%{transform:translateY(110vh) rotate(720deg);opacity:0}
    }

    /* UÇAN EMOJİ */
    .floating-emoji {
      position:fixed; font-size:1.8em; pointer-events:none; z-index:100;
      animation:float-up 1.4s ease-out forwards;
    }
    @keyframes float-up {
      0%{transform:translateY(0) scale(1);opacity:1}
      100%{transform:translateY(-120px) scale(1.4);opacity:0}
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- BAŞLANGIÇ -->
<div class="screen active" id="start-screen">
  <div class="start-emoji">🐇🐰</div>
  <div class="start-title">Bir Sürprizin Var!</div>
  <div class="start-sub">Hazır mısın? 🌸</div>
  <button class="btn-start" onclick="startRace()">Yarışı Başlat 🏁</button>
</div>

<!-- YARIŞ -->
<div class="screen" id="race-screen">
  <div class="race-title">🏁 Yarış Başladı! 🏁</div>
  <div class="race-track">
    <div class="lane">
      <div class="lane-label">1</div>
      <div class="lane-track">
        <div class="finish-line"></div>
        <div class="rabbit" id="r1">🐰</div>
      </div>
    </div>
    <div class="lane">
      <div class="lane-label">2</div>
      <div class="lane-track">
        <div class="finish-line"></div>
        <div class="rabbit" id="r2">🐇</div>
      </div>
    </div>
  </div>
  <div class="race-msg" id="race-msg"></div>
</div>

<!-- QUIZ -->
<div class="screen" id="quiz-screen">
  <div class="quiz-q" id="quiz-q"></div>
  <div class="quiz-btns" id="quiz-btns"></div>
</div>

<!-- PASTA -->
<div class="screen" id="cake-screen">
  <div class="cake-msg" id="cake-title">🎉 İyiki doğdun prenses! 🎉</div>
  <div class="cake-emoji" id="cake-emoji" onclick="eatCake()">🎂</div>
  <div class="nom-text" id="nom-text">nom nom 😋</div>
  <div class="cake-hint" id="cake-hint">Pastaya dokun 🎂</div>
  <div class="envelope" id="envelope" onclick="openEnvelope()">
    <div class="env-flap"></div>
    <div class="env-body"><div class="env-icon">💌</div></div>
  </div>
  <div class="letter" id="letter
